<!DOCTYPE html>
<html>
<head>
    <title>Data Redundancy Removal System</title>

    <style>

        body{
            font-family:Arial;
            background:#f2f2f2;
        }

        .container{
            width:400px;
            margin:80px auto;
            background:white;
            padding:20px;
            border-radius:8px;
        }

        input{

            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button{

            width:100%;
            padding:10px;
            background:#007acc;
            color:white;
            border:none;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="container">

<h2>Cloud Data Redundancy Removal System</h2>
<form action="/submit" method="POST">

    <label>Full Name</label>
    <input type="text"
           name="name"
           placeholder="Enter Full Name"
           required>

    <label>Email</label>
    <input type="email"
           name="email"
           placeholder="Enter Email"
           required>

    <label>Phone Number</label>
    <input type="tel"
           name="phone"
           placeholder="10 Digit Mobile Number"
           pattern="[0-9]{10}"
           required>

    <label>Registration Date</label>
    <input type="date"
           name="reg_date"
           required>

    <label>User Role</label>

    <select name="role" required>

        <option value="">Select Role</option>

        <option>User</option>

        <option>Admin</option>

        <option>Manager</option>

    </select>

    <br><br>

    <button type="submit">

        Validate & Store Data

    </button>

</form>

</div>

</body>

</html>
